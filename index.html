<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>呷胖環遊日本 Phase 2</title>
  <link rel="preload" as="image" href="assets/home-journey.webp" type="image/webp">
  <style>
    :root {
      color-scheme: light;
      --paper: #fff8ef;
      --paper-strong: #fffdf8;
      --ink: #253042;
      --muted: #697386;
      --line: #ead9c3;
      --coral: #e96f57;
      --coral-dark: #bd4b36;
      --teal: #2d9b9f;
      --teal-dark: #1d7076;
      --leaf: #7f9f4e;
      --gold: #e3a72f;
      --blue: #4d6fae;
      --shadow: 0 16px 36px rgba(79, 55, 31, 0.14);
      --radius: 8px;
      --tap: 56px;
      --font-ui: "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      --font-display: "Hiragino Mincho ProN", "Songti TC", "Noto Serif TC", "PingFang TC", serif;
      --font-travel: "Hiragino Mincho ProN", "Songti TC", "Noto Serif TC", "PingFang TC", serif;
      --font-kana: "Hiragino Maru Gothic ProN", "Yu Gothic", "PingFang TC", system-ui, sans-serif;
      font-family: var(--font-ui);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 0%, rgba(45, 155, 159, 0.14), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(233, 111, 87, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbf4 0%, var(--paper) 44%, #f5efe8 100%);
      background-attachment: fixed;
    }

    body.game-view {
      background:
        linear-gradient(90deg, rgba(255, 248, 239, 0.02), rgba(255, 248, 239, 0.18) 47%, rgba(255, 248, 239, 0.03)),
        linear-gradient(180deg, rgba(255, 253, 248, 0.02), rgba(255, 248, 239, 0.18) 66%, rgba(255, 248, 239, 0.08)),
        var(--game-background-image, none),
        radial-gradient(circle at 10% 0%, rgba(45, 155, 159, 0.14), transparent 30%),
        radial-gradient(circle at 88% 10%, rgba(233, 111, 87, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbf4 0%, var(--paper) 44%, #f5efe8 100%);
      background-position:
        center,
        center,
        var(--game-background-position, center),
        center,
        center,
        center;
      background-size:
        cover,
        cover,
        cover,
        cover,
        cover,
        cover;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      background:
        radial-gradient(circle at 16% 16%, rgba(255, 253, 248, 0.1), transparent 24%),
        radial-gradient(circle at 72% 8%, rgba(255, 253, 248, 0.08), transparent 28%);
      background-position: center;
      background-size: cover;
      background-repeat: no-repeat;
      transition: opacity 0.22s ease;
      z-index: 0;
    }

    body.game-view::before {
      opacity: 1;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
      touch-action: manipulation;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    [hidden] {
      display: none !important;
    }

    .home-screen {
      min-height: 100svh;
      padding: max(18px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));
      position: relative;
      z-index: 1;
      display: grid;
      align-items: end;
      justify-items: end;
      background:
        linear-gradient(90deg, rgba(255, 248, 239, 0.08), rgba(255, 248, 239, 0.44)),
        url("assets/home-journey.png") center / cover no-repeat;
      background-image:
        linear-gradient(90deg, rgba(255, 248, 239, 0.08), rgba(255, 248, 239, 0.44)),
        image-set(
          url("assets/home-journey.webp") type("image/webp"),
          url("assets/home-journey.png") type("image/png")
        );
      overflow: hidden;
    }

    .home-screen.hidden {
      display: none;
    }

    .start-journey-button {
      min-height: 58px;
      min-width: min(62vw, 220px);
      margin-right: clamp(12px, 9vw, 150px);
      margin-bottom: clamp(42px, 14vh, 128px);
      border-radius: 999px;
      padding: 0 28px;
      color: #fffdf8;
      background:
        linear-gradient(180deg, #f08b5f 0%, #d9573d 100%);
      border: 2px solid rgba(255, 253, 248, 0.92);
      box-shadow: 0 14px 30px rgba(137, 71, 34, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.34);
      font-size: clamp(1.08rem, 3.8vw, 1.32rem);
      font-weight: 900;
      letter-spacing: 0;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .start-journey-button:hover {
      background:
        linear-gradient(180deg, #e9744d 0%, #bd4b36 100%);
      box-shadow: 0 16px 34px rgba(137, 71, 34, 0.34), inset 0 1px 0 rgba(255, 255, 255, 0.32);
    }

    .start-journey-button:active {
      transform: translateY(1px);
    }

    .app {
      width: min(100%, 520px);
      min-height: 100svh;
      margin: 0 auto;
      padding: 14px 14px calc(18px + env(safe-area-inset-bottom));
      display: grid;
      gap: 12px;
      position: relative;
      z-index: 1;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 0 0 auto;
    }

    .shiba-mark {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
      background:
        radial-gradient(circle at 34% 43%, #3a2b21 0 4px, transparent 5px),
        radial-gradient(circle at 66% 43%, #3a2b21 0 4px, transparent 5px),
        radial-gradient(circle at 50% 61%, #3a2b21 0 4px, transparent 5px),
        radial-gradient(circle at 50% 70%, #fff4e2 0 18px, transparent 19px),
        linear-gradient(145deg, #df9f55, #f0c070);
      box-shadow: 0 8px 18px rgba(111, 70, 32, 0.18);
    }

    .shiba-mark::before,
    .shiba-mark::after {
      content: "";
      position: absolute;
      top: -5px;
      width: 18px;
      height: 24px;
      background: #d88f45;
      border: 3px solid #fff3df;
      transform: rotate(30deg);
      z-index: -1;
    }

    .shiba-mark::before {
      left: 4px;
      transform: rotate(-30deg);
    }

    .shiba-mark::after {
      right: 4px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-family: var(--font-display);
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle,
    .muted {
      color: var(--muted);
    }

    .subtitle {
      font-size: 0.84rem;
      margin-top: 2px;
    }

    .icon-button,
    .primary-button,
    .secondary-button,
    .ghost-button {
      min-height: 44px;
      border-radius: var(--radius);
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 800;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .icon-button:active,
    .primary-button:active,
    .secondary-button:active,
    .ghost-button:active,
    .kana-cell:active {
      transform: translateY(1px);
    }

    .icon-button {
      width: 44px;
      padding: 0;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
    }

    .icon-button.audio-off {
      color: var(--muted);
      background: rgba(246, 239, 228, 0.72);
      text-decoration: line-through;
    }

    .primary-button {
      color: #fff;
      background: var(--coral);
      box-shadow: 0 10px 20px rgba(189, 75, 54, 0.22);
    }

    .primary-button:hover {
      background: var(--coral-dark);
    }

    .secondary-button {
      color: #fff;
      background: var(--teal);
      box-shadow: 0 10px 20px rgba(29, 112, 118, 0.18);
    }

    .secondary-button:hover {
      background: var(--teal-dark);
    }

    .ghost-button {
      color: var(--ink);
      background: var(--paper-strong);
      border: 1px solid var(--line);
    }

    .station-panel,
    .map-select-panel,
    .play-panel,
    .status-panel,
    .postcard-panel {
      border: 1px solid rgba(234, 217, 195, 0.92);
      border-radius: var(--radius);
      background: rgba(255, 253, 248, 0.84);
      box-shadow: var(--shadow);
    }

    .station-panel {
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    body.game-view .station-panel,
    body.game-view .play-panel,
    body.game-view .status-panel {
      background: rgba(255, 253, 248, 0.68);
      -webkit-backdrop-filter: blur(2px);
      backdrop-filter: blur(2px);
    }

    .station-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
    }

    .station-index {
      font-size: 0.78rem;
      color: #fff;
      background: var(--blue);
      padding: 5px 8px;
      border-radius: 999px;
      white-space: nowrap;
      font-weight: 800;
    }

    .station-title {
      display: grid;
      gap: 3px;
      min-width: 0;
    }

    .station-title h2 {
      font-family: var(--font-display);
      font-size: 1.25rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .food-line {
      font-family: var(--font-travel);
      color: var(--teal-dark);
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .progress-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .progress-track {
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: #eadfce;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--leaf), var(--teal));
      transition: width 0.25s ease;
    }

    .progress-text {
      font-size: 0.84rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .play-panel {
      padding: 14px;
      display: grid;
      gap: 12px;
      min-width: 0;
    }

    .map-select-panel {
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .region-row {
      position: relative;
      aspect-ratio: 1717 / 916;
      border-radius: var(--radius);
      border: 1px solid rgba(222, 198, 161, 0.95);
      background:
        linear-gradient(180deg, rgba(255, 253, 248, 0.22), rgba(255, 253, 248, 0.03)),
        url("assets/jlpt-map-entrance.png") center / cover no-repeat;
      background-image:
        linear-gradient(180deg, rgba(255, 253, 248, 0.22), rgba(255, 253, 248, 0.03)),
        image-set(
          url("assets/jlpt-map-entrance.webp") type("image/webp"),
          url("assets/jlpt-map-entrance.png") type("image/png")
        );
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5), 0 10px 24px rgba(79, 55, 31, 0.12);
      overflow: hidden;
      isolation: isolate;
    }

    .region-button {
      min-height: 38px;
      border-radius: var(--radius);
      color: var(--muted);
      background: #f6efe4;
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .region-button {
      position: absolute;
      left: var(--map-x);
      top: var(--map-y);
      min-width: 0;
      width: clamp(48px, 15vw, 82px);
      min-height: clamp(38px, 9vw, 48px);
      padding: 5px 6px;
      display: grid;
      align-content: center;
      gap: 1px;
      color: #314258;
      background: rgba(255, 253, 248, 0.88);
      border-color: rgba(183, 143, 91, 0.5);
      box-shadow: 0 8px 18px rgba(83, 57, 32, 0.18);
      font-size: clamp(0.62rem, 2.4vw, 0.76rem);
      line-height: 1.08;
      transform: translate(-50%, -50%);
      backdrop-filter: blur(5px);
      z-index: 1;
    }

    .region-button::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -9px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--coral);
      border: 2px solid #fffdf8;
      box-shadow: 0 3px 8px rgba(79, 55, 31, 0.22);
      transform: translateX(-50%);
    }

    .region-level {
      font-size: clamp(0.76rem, 3vw, 0.9rem);
      font-weight: 900;
    }

    .region-name {
      font-size: clamp(0.54rem, 2.1vw, 0.66rem);
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .region-button.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .region-button.active {
      box-shadow: 0 10px 22px rgba(77, 111, 174, 0.28);
      transform: translate(-50%, -52%);
    }

    .region-button.active::after {
      background: var(--gold);
    }

    .region-button.locked {
      color: rgba(49, 66, 88, 0.58);
      background: rgba(246, 239, 228, 0.82);
      border-color: rgba(183, 143, 91, 0.32);
      box-shadow: 0 5px 12px rgba(83, 57, 32, 0.12);
      cursor: not-allowed;
      filter: grayscale(0.35);
    }

    .region-button.locked::after {
      background: #b8aa98;
    }

    .region-status {
      font-size: clamp(0.48rem, 1.8vw, 0.58rem);
      font-weight: 900;
      color: inherit;
    }

    @media (max-width: 520px) {
      .region-row {
        aspect-ratio: 941 / 1672;
        background:
          linear-gradient(180deg, rgba(255, 253, 248, 0.18), rgba(255, 253, 248, 0.02)),
          url("assets/jlpt-map-entrance-mobile.png") center / cover no-repeat;
        background-image:
          linear-gradient(180deg, rgba(255, 253, 248, 0.18), rgba(255, 253, 248, 0.02)),
          image-set(
            url("assets/jlpt-map-entrance-mobile.webp") type("image/webp"),
            url("assets/jlpt-map-entrance-mobile.png") type("image/png")
          );
      }

      .region-button {
        left: var(--mobile-map-x);
        top: var(--mobile-map-y);
        width: clamp(60px, 19vw, 78px);
        min-height: 44px;
      }
    }

    .clue-panel {
      min-height: 54px;
      border-radius: var(--radius);
      padding: 10px 12px;
      display: grid;
      gap: 2px;
      background: #eef7f3;
      border: 1px solid rgba(45, 155, 159, 0.28);
    }

    .clue-panel.hidden {
      display: none;
    }

    .clue-label {
      color: var(--teal-dark);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .clue-text {
      font-family: var(--font-display);
      font-size: 1.1rem;
      line-height: 1.25;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .board-wrap {
      width: 100%;
      min-width: 0;
      display: grid;
      justify-items: center;
      gap: 10px;
    }

    .board {
      width: 100%;
      max-width: 390px;
      aspect-ratio: 1;
      display: grid;
      grid-template-columns: repeat(var(--board-size, 4), 1fr);
      grid-template-rows: repeat(var(--board-size, 4), 1fr);
      gap: clamp(4px, 1.4vw, 8px);
      touch-action: none;
      user-select: none;
    }

    .kana-cell {
      min-width: 0;
      min-height: 0;
      border-radius: var(--radius);
      font-family: var(--font-kana);
      color: var(--ink);
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.94), rgba(255, 247, 235, 0.86));
      border: 2px solid #ecd9bd;
      box-shadow: inset 0 -4px 0 rgba(190, 139, 72, 0.12);
      font-size: clamp(1rem, calc(9vw / var(--board-size, 4) * 4), 2.05rem);
      font-weight: 900;
      display: grid;
      place-items: center;
      position: relative;
    }

    .kana-cell.selected {
      color: transparent;
      background: rgba(255, 255, 255, 0.42);
      border-color: rgba(163, 129, 88, 0.36);
      box-shadow: none;
      pointer-events: none;
    }

    .kana-cell.hint {
      color: #fff;
      background: var(--gold);
      border-color: #bf8120;
      animation: hintPulse 0.7s ease-in-out infinite alternate;
    }

    @keyframes hintPulse {
      from {
        box-shadow: 0 0 0 0 rgba(227, 167, 47, 0.2);
      }
      to {
        box-shadow: 0 0 0 7px rgba(227, 167, 47, 0.22);
      }
    }

    .spell-box {
      min-height: 52px;
      border-radius: var(--radius);
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f6efe4;
      border: 1px dashed #d8bd96;
    }

    .spell-text {
      min-width: 0;
      font-family: var(--font-kana);
      font-size: 1.35rem;
      line-height: 1.2;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .target-count {
      white-space: nowrap;
      color: var(--teal-dark);
      font-weight: 900;
      font-size: 0.9rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .controls .wide {
      grid-column: 1 / -1;
    }

    .status-panel {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .message {
      min-height: 28px;
      color: var(--ink);
      font-weight: 800;
      line-height: 1.35;
    }

    .word-card {
      display: none;
      border-radius: var(--radius);
      border: 1px solid #d6c29f;
      background: #fffdf7;
      padding: 12px;
      gap: 4px;
    }

    .word-card.show {
      display: grid;
    }

    .word-main {
      font-family: var(--font-travel);
      font-size: 1.18rem;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .word-zh {
      color: var(--muted);
      font-weight: 800;
    }

    .tag {
      width: fit-content;
      border-radius: 999px;
      padding: 3px 8px;
      color: #fff;
      background: var(--leaf);
      font-size: 0.75rem;
      font-weight: 900;
    }

    .map-strip {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 5px;
    }

    .map-dot {
      height: 10px;
      min-height: 10px;
      padding: 0;
      border-radius: 999px;
      background: #dcccb6;
    }

    .map-dot:not(:disabled):hover {
      transform: translateY(-1px);
    }

    .map-dot.done {
      background: var(--teal);
    }

    .map-dot.current {
      background: var(--coral);
    }

    .footer-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .postcard-panel {
      display: none;
      padding: 14px;
      gap: 12px;
      position: relative;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(189, 75, 54, 0.06) 0 9px, transparent 9px 100%),
        radial-gradient(circle at 13% 18%, rgba(227, 167, 47, 0.18), transparent 24%),
        radial-gradient(circle at 84% 4%, rgba(45, 155, 159, 0.14), transparent 27%),
        linear-gradient(180deg, rgba(255, 253, 248, 0.92), rgba(255, 248, 239, 0.88));
    }

    .postcard-panel.open {
      display: grid;
    }

    .album-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: max(18px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(18px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background:
        radial-gradient(circle at 50% 12%, rgba(255, 253, 248, 0.18), transparent 28%),
        rgba(37, 48, 66, 0.48);
      z-index: 18;
      overflow: auto;
      perspective: 1200px;
    }

    .album-backdrop.open {
      display: grid;
    }

    body.album-open {
      overflow: hidden;
    }

    .album-book {
      width: min(100%, 1200px);
      max-height: calc(100svh - 36px);
      display: grid;
      position: relative;
      transform-origin: center left;
      filter: drop-shadow(0 30px 42px rgba(26, 32, 44, 0.28));
    }

    .album-book::before {
      content: "";
      position: absolute;
      inset: 10px auto 10px -10px;
      width: 30px;
      border-radius: 8px 0 0 8px;
      background:
        linear-gradient(90deg, #af5b46, #d98c66 45%, #7f4639);
      box-shadow: inset -8px 0 14px rgba(37, 48, 66, 0.24);
      z-index: 0;
    }

    .album-book::after {
      content: "";
      position: absolute;
      inset: 16px 50% 16px auto;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(123, 91, 54, 0.32), transparent);
      z-index: 2;
      pointer-events: none;
    }

    .album-backdrop.open .album-book {
      animation: albumBookOpen 0.42s cubic-bezier(0.2, 0.82, 0.2, 1) both;
    }

    .album-backdrop.open .postcard-panel {
      animation: albumPageSettle 0.5s cubic-bezier(0.2, 0.82, 0.2, 1) both;
    }

    .album-book .postcard-panel {
      max-height: calc(100svh - 36px);
      overflow: auto;
      padding: clamp(16px, 2.6vw, 34px);
      transform-origin: left center;
      z-index: 1;
    }

    .album-close-button {
      position: absolute;
      top: -12px;
      right: -10px;
      width: 42px;
      min-height: 42px;
      padding: 0;
      border-radius: 50%;
      color: var(--ink);
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid rgba(214, 194, 159, 0.9);
      box-shadow: 0 10px 22px rgba(79, 55, 31, 0.14);
      font-size: 1.35rem;
      font-weight: 900;
      line-height: 1;
      z-index: 4;
    }

    .album-close-button:hover {
      background: #fffdf8;
    }

    @keyframes albumBookOpen {
      from {
        opacity: 0;
        transform: translateY(22px) rotateX(9deg) rotateY(-14deg) scale(0.92);
      }
      to {
        opacity: 1;
        transform: translateY(0) rotateX(0) rotateY(0) scale(1);
      }
    }

    @keyframes albumPageSettle {
      from {
        clip-path: inset(0 48% 0 48% round 8px);
        transform: rotateY(-7deg);
      }
      to {
        clip-path: inset(0 0 0 0 round 8px);
        transform: rotateY(0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .album-backdrop.open .album-book,
      .album-backdrop.open .postcard-panel {
        animation: none;
      }
    }

    .postcard-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(90deg, rgba(123, 91, 54, 0.08) 0 1px, transparent 1px 100%) 34px 0 / 18px 100%,
        radial-gradient(circle at 22% 38%, rgba(37, 48, 66, 0.04) 0 1px, transparent 2px) 0 0 / 18px 18px;
      mix-blend-mode: multiply;
      opacity: 0.7;
    }

    .postcard-album-head,
    .postcard-album-progress,
    .postcard-grid {
      position: relative;
      z-index: 1;
    }

    .postcard-album-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      padding-bottom: 10px;
      border-bottom: 1px dashed rgba(183, 143, 91, 0.52);
    }

    .postcard-album-title {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .album-eyebrow {
      width: fit-content;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--teal-dark);
      background: rgba(238, 247, 243, 0.78);
      border: 1px solid rgba(45, 155, 159, 0.22);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .postcard-album-title h2 {
      font-family: var(--font-display);
      font-size: 1.24rem;
      font-weight: 600;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .postcard-album-title p {
      font-family: var(--font-travel);
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .album-stamp {
      width: 62px;
      aspect-ratio: 1;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      color: var(--coral-dark);
      background:
        radial-gradient(circle, rgba(255, 253, 248, 0.86) 0 50%, transparent 51%),
        repeating-radial-gradient(circle, rgba(189, 75, 54, 0.42) 0 2px, transparent 2px 5px);
      border: 2px dashed rgba(189, 75, 54, 0.58);
      transform: rotate(5deg);
      font-weight: 600;
      box-shadow: 0 8px 18px rgba(79, 55, 31, 0.12);
    }

    .postcard-album-progress {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px 10px;
      align-items: center;
    }

    .album-progress-track {
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(220, 204, 182, 0.72);
      border: 1px solid rgba(214, 194, 159, 0.78);
    }

    .album-progress-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gold), var(--coral), var(--teal));
      transition: width 0.25s ease;
    }

    .album-progress-text {
      color: var(--teal-dark);
      font-size: 0.82rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .postcard-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .postcard-entry {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .postcard {
      min-height: clamp(132px, 18vw, 178px);
      aspect-ratio: 3 / 2;
      border-radius: var(--radius);
      border: 1px solid #dbc5a6;
      background:
        linear-gradient(140deg, rgba(77, 111, 174, 0.1), transparent 40%),
        linear-gradient(180deg, #fffdf7, #f4eadc);
      overflow: hidden;
      position: relative;
      box-shadow: 0 10px 22px rgba(79, 55, 31, 0.12);
      transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
    }

    .postcard-entry.unlocked .postcard {
      cursor: pointer;
    }

    .postcard-entry.unlocked:hover .postcard {
      transform: translateY(-2px) rotate(-0.4deg);
      box-shadow: 0 14px 28px rgba(79, 55, 31, 0.17);
    }

    .postcard.locked {
      filter: grayscale(0.7);
      opacity: 0.58;
    }

    .postcard-scene,
    .postcard-shiba {
      position: absolute;
      pointer-events: none;
    }

    .postcard-scene {
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    .postcard-shiba {
      right: var(--shiba-right, 4%);
      bottom: var(--shiba-bottom, 24%);
      width: var(--shiba-width, 48%);
      max-height: 68%;
      object-fit: contain;
      object-position: center bottom;
      z-index: 1;
      filter: drop-shadow(0 8px 10px rgba(61, 40, 22, 0.22));
    }

    .postcard-scene.hidden,
    .postcard-shiba.hidden {
      display: none;
    }

    .postcard::before {
      content: "";
      position: absolute;
      inset: 8px;
      border: 1px solid rgba(37, 48, 66, 0.12);
      border-radius: 6px;
      pointer-events: none;
      z-index: 2;
    }

    .postcard-caption {
      min-height: 72px;
      display: grid;
      align-content: start;
      gap: 2px;
      padding: 8px 9px;
      border-radius: 7px;
      background: rgba(255, 253, 248, 0.82);
      border: 1px dashed rgba(183, 143, 91, 0.42);
    }

    .postcard-caption-head {
      display: flex;
      gap: 6px;
      align-items: start;
      justify-content: space-between;
      min-width: 0;
    }

    .postcard-title,
    .postcard-food,
    .postcard-note {
      width: 100%;
      max-width: 100%;
      font-family: var(--font-travel);
      background: transparent;
      box-shadow: none;
    }

    .postcard-title {
      font-weight: 700;
    }

    .postcard-caption-head .postcard-title {
      min-width: 0;
    }

    .postcard-food,
    .postcard-note {
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 700;
    }

    .pose-menu-button {
      min-height: 28px;
      flex: 0 0 auto;
      border-radius: 999px;
      padding: 3px 8px;
      color: var(--teal-dark);
      background: rgba(238, 247, 243, 0.9);
      border: 1px solid rgba(45, 155, 159, 0.24);
      font-size: 0.72rem;
      font-weight: 900;
    }

    .pose-picker {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
      padding-top: 4px;
    }

    .pose-option {
      min-height: 34px;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 2px;
      border-radius: 7px;
      color: var(--muted);
      background: rgba(255, 253, 248, 0.9);
      border: 1px solid rgba(214, 194, 159, 0.82);
      font-size: 0.72rem;
      font-weight: 900;
      overflow: hidden;
    }

    .pose-option.active {
      color: #fff;
      background: rgba(45, 155, 159, 0.95);
      border-color: rgba(29, 112, 118, 0.9);
      box-shadow: 0 5px 12px rgba(29, 112, 118, 0.2);
    }

    .pose-option.locked {
      color: rgba(105, 115, 134, 0.52);
      background: rgba(246, 239, 228, 0.66);
      border-style: dashed;
    }

    .pose-option img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 6px rgba(61, 40, 22, 0.16));
    }

    .postcard-slot {
      position: absolute;
      inset: 12px;
      display: grid;
      place-items: center;
      z-index: 1;
      font-family: var(--font-display);
      color: rgba(37, 48, 66, 0.22);
      border: 1px dashed rgba(123, 91, 54, 0.26);
      border-radius: 6px;
      font-size: 0;
      font-weight: 600;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(37, 48, 66, 0.36);
      z-index: 20;
    }

    .modal-backdrop.open {
      display: grid;
    }

    .modal {
      width: min(100%, 440px);
      border-radius: var(--radius);
      background: var(--paper-strong);
      border: 1px solid var(--line);
      box-shadow: 0 24px 60px rgba(37, 48, 66, 0.28);
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .modal h2 {
      font-family: var(--font-display);
      font-size: 1.35rem;
      font-weight: 600;
      line-height: 1.25;
    }

    .modal-postcard {
      min-height: 232px;
      aspect-ratio: 3 / 2;
      border-radius: var(--radius);
      border: 1px solid #dbc5a6;
      background:
        linear-gradient(135deg, rgba(233, 111, 87, 0.18), transparent 38%),
        linear-gradient(315deg, rgba(45, 155, 159, 0.18), transparent 42%),
        linear-gradient(180deg, #fffdf7, #f4eadc);
      overflow: hidden;
      position: relative;
      padding: 12px;
      display: grid;
      align-content: end;
      gap: 3px;
    }

    .modal-postcard::before {
      content: "";
      position: absolute;
      inset: 10px;
      border: 1px solid rgba(37, 48, 66, 0.12);
      border-radius: 6px;
      pointer-events: none;
      z-index: 2;
    }

    .modal-postcard .postcard-shiba {
      right: var(--shiba-modal-right, 7%);
      bottom: var(--shiba-modal-bottom, 18%);
      width: var(--shiba-modal-width, 42%);
      max-height: 72%;
    }

    .modal-postcard .postcard-scene.hidden,
    .modal-postcard .postcard-shiba.hidden {
      display: none;
    }

    .modal-postcard.clean .postcard-shiba {
      display: none;
    }

    .modal-postcard-info {
      display: grid;
      gap: 5px;
      padding: 10px 12px;
      border-radius: var(--radius);
      background: #fffdf7;
      border: 1px dashed rgba(183, 143, 91, 0.48);
    }

    .modal-postcard-badge,
    .modal-postcard-title,
    .modal-postcard-meta,
    .modal-postcard-note {
      width: fit-content;
      max-width: 100%;
    }

    .modal-postcard-badge {
      border-radius: 999px;
      padding: 4px 8px;
      color: #fff;
      background: var(--coral);
      font-size: 0.76rem;
      font-weight: 900;
      box-shadow: 0 6px 14px rgba(189, 75, 54, 0.18);
    }

    .modal-postcard-title {
      font-family: var(--font-travel);
      font-size: 1.16rem;
      line-height: 1.22;
      font-weight: 700;
    }

    .modal-postcard-meta,
    .modal-postcard-note {
      font-family: var(--font-travel);
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .modal-pose-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-top: 4px;
      color: var(--teal-dark);
      font-size: 0.82rem;
      font-weight: 900;
    }

    .modal-pose-switch {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 7px;
      padding: 4px 0 2px;
    }

    .modal-pose-switch .pose-option {
      min-height: 48px;
    }

    .modal-travel-log {
      margin: 0;
      border-radius: var(--radius);
      padding: 12px 14px;
      color: #3b4657;
      background: rgba(238, 247, 243, 0.72);
      border: 1px solid rgba(45, 155, 159, 0.22);
      font-family: var(--font-travel);
      font-size: 0.95rem;
      font-weight: 700;
      line-height: 1.65;
      overflow-wrap: anywhere;
    }

    .modal-travel-log-label {
      display: block;
      margin-bottom: 4px;
      color: var(--teal-dark);
      font-family: var(--font-ui);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (min-width: 700px) {
      .app {
        padding-top: 24px;
      }

      .controls,
      .footer-actions {
        grid-template-columns: repeat(4, 1fr);
      }

      .controls .wide {
        grid-column: auto;
      }

      .postcard-grid {
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: clamp(12px, 1.25vw, 18px);
      }
    }

    @media (min-width: 900px) {
      .postcard-panel {
        gap: 16px;
      }

      .postcard-album-head {
        gap: 18px;
        padding-bottom: 14px;
      }

      .album-stamp {
        width: 76px;
      }

      .postcard-album-title h2 {
        font-size: 1.55rem;
      }

      .postcard-album-title p {
        font-size: 1rem;
      }

      .album-progress-text {
        font-size: 0.95rem;
      }

      .postcard-caption {
        min-height: 82px;
        padding: 10px 12px;
      }

      .postcard-title {
        font-size: 1.08rem;
      }

      .postcard-food,
      .postcard-note {
        font-size: 0.92rem;
      }
    }

    @media (min-width: 900px) {
      .app {
        width: min(100%, 1120px);
        padding-inline: 24px;
      }

      .map-select-panel {
        padding: 12px;
      }

      .region-button {
        width: 96px;
        min-height: 56px;
        padding: 8px 10px;
        font-size: 0.86rem;
      }

      .region-level {
        font-size: 1.05rem;
      }

      .region-name {
        font-size: 0.76rem;
      }
    }

    @media (max-width: 620px) {
      .home-screen {
        align-items: end;
        justify-items: center;
        background-position: 38% center;
      }

      .start-journey-button {
        width: min(100%, 240px);
        margin-right: 0;
        margin-bottom: clamp(24px, 9vh, 72px);
      }

      .album-backdrop {
        align-items: start;
        padding: max(10px, env(safe-area-inset-top)) max(8px, env(safe-area-inset-right)) max(10px, env(safe-area-inset-bottom)) max(8px, env(safe-area-inset-left));
      }

      .album-book {
        width: 100%;
        max-height: calc(100svh - 20px);
      }

      .album-book::before {
        inset: 8px auto 8px -6px;
        width: 18px;
      }

      .album-book::after {
        opacity: 0.45;
      }

      .album-book .postcard-panel {
        max-height: calc(100svh - 20px);
        padding: 14px 10px 16px 14px;
      }

      .album-close-button {
        top: -8px;
        right: -6px;
        width: 38px;
        min-height: 38px;
      }

      .postcard-album-head {
        gap: 8px;
      }

      .album-stamp {
        width: 54px;
        font-size: 0.9rem;
      }

      .postcard-album-progress {
        grid-template-columns: 1fr;
      }

      .album-progress-text {
        white-space: normal;
      }

      .postcard-grid {
        gap: 8px;
      }

      .postcard {
        min-height: 104px;
      }

      .postcard-caption {
        min-height: 66px;
        padding: 7px 8px;
      }

      .postcard-title {
        font-size: 0.95rem;
      }

      .postcard-food,
      .postcard-note {
        font-size: 0.76rem;
      }
    }
  </style>
</head>
<body>
  <section class="home-screen" id="homeScreen" aria-label="遊戲首頁">
    <button class="start-journey-button" type="button" id="startJourneyButton">開始遊戲</button>
  </section>

  <main class="app" id="gameApp" hidden>
    <header class="topbar" aria-label="遊戲標題">
      <div class="brand">
        <div class="shiba-mark" aria-hidden="true"></div>
      <div>
          <h1>呷胖環遊日本</h1>
          <p class="subtitle" id="regionSubtitle">N5 沖繩區</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="ghost-button" type="button" id="backToMapButton" hidden>返回</button>
        <button class="icon-button" type="button" id="audioToggleButton" title="音效開關" aria-label="關閉音效">♪</button>
        <button class="icon-button" type="button" id="newRoundButton" title="換一盤" aria-label="換一盤">↻</button>
      </div>
    </header>

    <section class="map-select-panel" id="mapSelectPanel" aria-label="JLPT 關卡入口">
      <div class="region-row" id="regionRow" tabindex="-1" aria-label="選擇 N1 到 N5 關卡"></div>
    </section>

    <section class="station-panel" id="stationPanel" aria-label="目前站點" hidden>
      <div class="station-head">
        <div class="station-title">
          <span class="station-index" id="stationIndex">1 / 10</span>
          <h2 id="stationName">出發的狗屋</h2>
          <p class="food-line" id="foodName">沖縄そば｜沖繩麵</p>
        </div>
        <p class="muted" id="stationJa">出発の犬小屋</p>
      </div>
      <div class="progress-row">
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="stationProgressFill"></div>
        </div>
        <span class="progress-text" id="stationProgressText">0 / 10</span>
      </div>
    </section>

    <section class="play-panel" id="playPanel" aria-label="拼字棋盤" hidden>
      <div class="clue-panel" id="cluePanel">
        <span class="clue-label">中文提示</span>
        <strong class="clue-text" id="clueText">準備題目中</strong>
      </div>
      <div class="board-wrap">
        <div class="board" id="board" aria-label="平假名棋盤"></div>
        <div class="spell-box">
          <strong class="spell-text" id="currentSpell">請連假名</strong>
          <span class="target-count" id="targetCount">本盤還藏 0 個目標詞</span>
        </div>
      </div>
      <div class="controls">
        <button class="primary-button wide" type="button" id="submitButton">送出</button>
        <button class="ghost-button" type="button" id="clearButton">清除</button>
        <button class="secondary-button" type="button" id="hintButton">提示 3</button>
        <button class="ghost-button" type="button" id="postcardToggleButton">明信片</button>
      </div>
    </section>

    <section class="status-panel" id="statusPanel" aria-live="polite" hidden>
      <p class="message" id="message">點選棋盤上的假名拼出當前等級單字，低階複習詞會跳卡但不計過站。</p>
      <div class="word-card" id="wordCard">
        <strong class="word-main" id="wordMain"></strong>
        <span class="word-zh" id="wordZh"></span>
        <span class="tag" id="wordLevel">N5</span>
      </div>
      <div class="map-strip" id="mapStrip" aria-label="沖繩站點進度"></div>
      <div class="footer-actions">
        <button class="ghost-button" type="button" id="resetButton">重置進度</button>
        <button class="ghost-button" type="button" id="nextStationButton">下一站</button>
      </div>
    </section>

    <div class="album-backdrop" id="postcardAlbumBackdrop" role="dialog" aria-modal="true" aria-labelledby="postcardAlbumTitle">
      <div class="album-book">
        <button class="album-close-button" type="button" id="postcardAlbumCloseButton" aria-label="關閉明信片收集本">×</button>
        <section class="postcard-panel" id="postcardPanel" aria-label="明信片收集本">
          <div class="postcard-album-head">
            <div class="postcard-album-title">
              <span class="album-eyebrow">旅の記録</span>
              <h2 id="postcardAlbumTitle">明信片收集本</h2>
              <p id="postcardAlbumHint">完成每一站就能把水彩明信片收進來。</p>
            </div>
            <strong class="album-stamp" id="postcardAlbumStamp">0 / 10</strong>
          </div>
          <div class="postcard-album-progress" aria-label="明信片收集進度">
            <div class="album-progress-track" aria-hidden="true">
              <div class="album-progress-fill" id="postcardAlbumFill"></div>
            </div>
            <span class="album-progress-text" id="postcardAlbumText">尚未收集</span>
          </div>
          <div class="postcard-grid" id="postcardGrid"></div>
        </section>
      </div>
    </div>
  </main>

  <div class="modal-backdrop" id="stationModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
      <h2 id="modalTitle">過站成功</h2>
      <p id="modalText">呷胖吃飽了，明信片也收到了。</p>
      <article class="modal-postcard" id="modalPostcard" aria-label="取得的明信片">
        <img class="postcard-scene" id="modalPostcardImage" alt="">
        <img class="postcard-shiba" id="modalPostcardShiba" alt="">
      </article>
      <div class="modal-postcard-info" aria-label="明信片說明欄">
        <span class="modal-postcard-badge" id="modalPostcardBadge">新明信片</span>

      function isPlayableWord(word) {
        return Boolean(word.normalizedReading) && !word.normalizedReading.includes("ー");
      }

      function uniqueFirstWordByReadingAndWriting(words) {
        const seen = new Set();
        return words.filter((word) => {
          const key = `${word.normalizedReading}\u0000${word.writing}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      const ALL_WORDS = uniqueFirstWordByReadingAndWriting(LEVEL_ORDER.flatMap((level) =>
        RAW_WORDS_BY_LEVEL[level].map(([id, reading, writing, declaredNormalizedReading, zh, script]) => {
          const normalizedReading = normalizeKanaReading(reading || declaredNormalizedReading);
          return {
            id,
            reading,
            writing,
            normalizedReading,
            zh,
            level,
            script
          };
        })
      ).filter(isPlayableWord));

      const WORDS_BY_LEVEL = LEVEL_ORDER.reduce((map, level) => {
        map[level] = ALL_WORDS.filter((word) => word.level === level);
        return map;
      }, {});

        if (!map.has(word.normalizedReading)) map.set(word.normalizedReading, []);
        map.get(word.normalizedReading).push(word);
        return map;

      function loadAudioPreference() {
        try {
          return localStorage.getItem(AUDIO_SAVE_KEY) !== "off";
        } catch (error) {
          return true;
        }
      }

      function persistAudioPreference() {
        try {
          localStorage.setItem(AUDIO_SAVE_KEY, audioEnabled ? "on" : "off");
        } catch (error) {
          // Audio preference is nice to have; gameplay should keep working without storage.
        }
      }

      function ensureAudioGraph() {
        if (audioContext) return audioContext;
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) return null;

        audioContext = new AudioCtor();
        masterGain = audioContext.createGain();
        sfxGain = audioContext.createGain();
        musicGain = audioContext.createGain();

        masterGain.gain.value = audioEnabled ? 0.62 : 0;
        sfxGain.gain.value = 0.72;
        musicGain.gain.value = 0.18;
        sfxGain.connect(masterGain);
        musicGain.connect(masterGain);
        masterGain.connect(audioContext.destination);
        return audioContext;
      }

      function rampGain(gainNode, value, duration = 0.08) {
        if (!audioContext || !gainNode) return;
        const now = audioContext.currentTime;
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setTargetAtTime(value, now, duration);
      }

      function unlockAudio() {
        const context = ensureAudioGraph();
        if (!context) return Promise.resolve(null);
        ensureBarkAudio();
        const afterResume = () => {
          rampGain(masterGain, audioEnabled ? 0.78 : 0);
          updateAudioToggle();
          updateStationMusic();
          return context;
        };
        if (context.state === "suspended") {
          return context.resume().then(afterResume).catch(afterResume);
        }
        return Promise.resolve(afterResume());
      }

      function ensureBarkAudio() {
        if (barkAudioElement) return barkAudioElement;
        barkAudioElement = new Audio(BARK_AUDIO_SRC);
        barkAudioElement.preload = "auto";
        barkAudioElement.volume = 0.9;
        return barkAudioElement;
      }

      function updateAudioToggle() {
        els.audioToggleButton.classList.toggle("audio-off", !audioEnabled);
        els.audioToggleButton.textContent = audioEnabled ? "♪" : "×";
        els.audioToggleButton.title = audioEnabled ? "關閉音效" : "開啟音效";
        els.audioToggleButton.setAttribute("aria-label", audioEnabled ? "關閉音效" : "開啟音效");
        els.audioToggleButton.setAttribute("aria-pressed", String(audioEnabled));
      }

      function setAudioEnabled(enabled) {
        audioEnabled = enabled;
        persistAudioPreference();
        updateAudioToggle();
        if (!audioEnabled) {
          rampGain(masterGain, 0);
          stopOkinawaMusic();
          return;
        }
        unlockAudio();
      }

      function toggleAudio() {
        setAudioEnabled(!audioEnabled);
      }

      function barkNoise() {
        const context = ensureAudioGraph();
        if (!context) return null;
        if (barkNoiseBuffer) return barkNoiseBuffer;

        const length = Math.floor(context.sampleRate * 0.32);
        barkNoiseBuffer = context.createBuffer(1, length, context.sampleRate);
        const data = barkNoiseBuffer.getChannelData(0);
        for (let index = 0; index < length; index += 1) {
          const decay = 1 - index / length;
          data[index] = (Math.random() * 2 - 1) * decay;
        }
        return barkNoiseBuffer;
      }

      function scheduleBarkBurst(time, options) {
        const context = ensureAudioGraph();
        if (!context || !sfxGain) return;
        const duration = options.duration;
        const noiseSource = context.createBufferSource();
        const noiseBand = context.createBiquadFilter();
        const noiseLowpass = context.createBiquadFilter();
        const noiseGain = context.createGain();
        const throat = context.createOscillator();
        const throatFilter = context.createBiquadFilter();
        const throatGain = context.createGain();

        noiseSource.buffer = barkNoise();
        noiseBand.type = "bandpass";
        noiseBand.frequency.setValueAtTime(options.noiseFrequency, time);
        noiseBand.frequency.exponentialRampToValueAtTime(options.noiseEndFrequency, time + duration);
        noiseBand.Q.value = 1.1;
        noiseLowpass.type = "lowpass";
        noiseLowpass.frequency.setValueAtTime(1900, time);
        noiseLowpass.frequency.exponentialRampToValueAtTime(900, time + duration);
        noiseGain.gain.setValueAtTime(0.0001, time);
        noiseGain.gain.exponentialRampToValueAtTime(options.noiseGain, time + 0.012);
        noiseGain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

        throat.type = "square";
        throat.frequency.setValueAtTime(options.frequency, time);
        throat.frequency.exponentialRampToValueAtTime(options.endFrequency, time + duration);
        throatFilter.type = "bandpass";
        throatFilter.frequency.setValueAtTime(options.formant, time);
        throatFilter.frequency.exponentialRampToValueAtTime(options.formant * 0.72, time + duration);
        throatFilter.Q.value = 3.4;
        throatGain.gain.setValueAtTime(0.0001, time);
        throatGain.gain.exponentialRampToValueAtTime(options.throatGain, time + 0.018);
        throatGain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

        noiseSource.connect(noiseBand);
        noiseBand.connect(noiseLowpass);
        noiseLowpass.connect(noiseGain);
        noiseGain.connect(sfxGain);
        throat.connect(throatFilter);
        throatFilter.connect(throatGain);
        throatGain.connect(sfxGain);

        noiseSource.start(time);
        throat.start(time);
        noiseSource.stop(time + duration + 0.03);
        throat.stop(time + duration + 0.03);
      }

      function scheduleBarkSound() {
        const context = ensureAudioGraph();
        if (!context || !sfxGain) return;
        const start = context.currentTime + 0.018;
        [
          { time: start, duration: 0.16, frequency: 175, endFrequency: 92, formant: 520, noiseFrequency: 980, noiseEndFrequency: 520, throatGain: 0.34, noiseGain: 0.58 },
          { time: start + 0.15, duration: 0.19, frequency: 150, endFrequency: 78, formant: 430, noiseFrequency: 760, noiseEndFrequency: 410, throatGain: 0.3, noiseGain: 0.52 }
        ].forEach((burst) => {
          scheduleBarkBurst(burst.time, burst);
        });
      }

      function playBark() {
        if (!audioEnabled) return;
        unlockAudio().then(() => {
          const bark = ensureBarkAudio();
          bark.pause();
          bark.currentTime = 0;
          const playPromise = bark.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => scheduleBarkSound());
          }
        });
      }

      function schedulePluck(frequency, time, options = {}) {
        const context = ensureAudioGraph();
        if (!context || !musicGain) return;
        const duration = options.duration || 0.58;
        const gainValue = options.gain || 0.22;
        const oscillator = context.createOscillator();
        const filter = context.createBiquadFilter();
        const gain = context.createGain();

        oscillator.type = options.type || "triangle";
        oscillator.frequency.setValueAtTime(frequency, time);
        oscillator.detune.setValueAtTime(options.detune || 0, time);
        filter.type = "bandpass";
        filter.frequency.setValueAtTime(frequency * 2.15, time);
        filter.Q.value = options.q || 6;
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(gainValue, time + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + duration);

        oscillator.connect(filter);
        filter.connect(gain);
        gain.connect(musicGain);
        oscillator.start(time);
        oscillator.stop(time + duration + 0.04);
      }

      function scheduleSoftDrum(time) {
        const context = ensureAudioGraph();
        if (!context || !musicGain) return;
        const oscillator = context.createOscillator();
        const gain = context.createGain();

        oscillator.type = "sine";
        oscillator.frequency.setValueAtTime(96, time);
        oscillator.frequency.exponentialRampToValueAtTime(58, time + 0.16);
        gain.gain.setValueAtTime(0.0001, time);
        gain.gain.exponentialRampToValueAtTime(0.08, time + 0.012);
        gain.gain.exponentialRampToValueAtTime(0.0001, time + 0.22);

        oscillator.connect(gain);
        gain.connect(musicGain);
        oscillator.start(time);
        oscillator.stop(time + 0.25);
      }

      function scheduleOkinawaMusic() {
        if (!okinawaMusicRunning || !audioContext || !musicGain) return;
        const melody = [
          523.25, 659.25, 698.46, 783.99,
          987.77, 783.99, 698.46, 659.25,
          523.25, null, 659.25, 698.46,
          783.99, 698.46, 659.25, null
        ];
        while (okinawaMusicNextTime < audioContext.currentTime + OKINAWA_MUSIC_LOOKAHEAD_SECONDS) {
          const stepInBar = okinawaMusicStep % OKINAWA_MUSIC_STEPS_PER_BAR;
          const note = melody[okinawaMusicStep % melody.length];
          if (note) {
            schedulePluck(note, okinawaMusicNextTime, {
              duration: stepInBar % 2 === 0 ? 0.62 : 0.42,
              gain: stepInBar === 0 ? 0.2 : 0.15,
              q: 7
            });
            if (stepInBar === 2 || stepInBar === 6) {
              schedulePluck(note * 1.01, okinawaMusicNextTime + 0.045, {
                duration: 0.34,
                gain: 0.06,
                detune: 6,
                q: 8
              });
            }
          }
          if (stepInBar === 0) {
            schedulePluck(130.81, okinawaMusicNextTime, { duration: 1.15, gain: 0.08, type: "sine", q: 3 });
            scheduleSoftDrum(okinawaMusicNextTime + 0.02);
          }
          if (stepInBar === 4) {
            schedulePluck(196, okinawaMusicNextTime, { duration: 0.9, gain: 0.055, type: "sine", q: 3 });
          }
          okinawaMusicStep += 1;
          okinawaMusicNextTime += OKINAWA_MUSIC_STEP_SECONDS;
        }
      }

      function shouldPlayFirstStationMusic() {
        return audioEnabled && appView === APP_VIEW_GAME && currentRegion().id === FIRST_REGION_ID;
      }

      function startOkinawaMusic() {
        const context = ensureAudioGraph();
        if (!context || okinawaMusicRunning) return;
        if (context.state === "suspended") {
          context.resume().then(updateStationMusic).catch(() => {});
          return;
        }
        okinawaMusicRunning = true;
        okinawaMusicStep = 0;
        okinawaMusicNextTime = context.currentTime + 0.08;
        rampGain(musicGain, 0.32, 0.12);
        scheduleOkinawaMusic();
        okinawaMusicTimer = window.setInterval(scheduleOkinawaMusic, 180);
      }

      function stopOkinawaMusic() {
        if (okinawaMusicTimer) {
          window.clearInterval(okinawaMusicTimer);
          okinawaMusicTimer = 0;
        }
        okinawaMusicRunning = false;
        rampGain(musicGain, 0, 0.1);
      }

      function updateStationMusic() {
        if (!audioContext) {
          updateAudioToggle();
          return;
        }
        if (shouldPlayFirstStationMusic()) {
          startOkinawaMusic();
          return;
        }
        stopOkinawaMusic();
      }

      function showGameApp() {
        els.homeScreen.classList.add("hidden");

      function enterRegion(regionId) {

      function regionSaveKey(regionId) {
        return `fatShiba.phase2.region.${regionId}.v1`;
      }

      function currentRegion() {
        return REGION_BY_ID.get(rootSave.currentRegionId) || REGIONS[0];
      }

      function isRegionOpen(region) {
        return OPEN_LEVELS.has(region.level);
      }

      function currentLevel() {
        return currentRegion().level;
      }

      function currentSettings() {
        return LEVEL_SETTINGS[currentLevel()];
      }

      function currentBoardSize() {
        return currentSettings().boardSize;
      }

      function currentWordsPerStation() {
        return currentSettings().wordsPerStation;
      }

      function currentStations() {

      }

      function createInitialRootSave() {
        return {
          currentRegionId: REGIONS[0].id
        };
      }

      function loadRootSave() {
        try {
          const raw = localStorage.getItem(ROOT_SAVE_KEY);
          if (!raw) return createInitialRootSave();
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) return createInitialRootSave();
          const savedRegion = REGION_BY_ID.get(parsed.currentRegionId);
          return {
            currentRegionId: savedRegion && isRegionOpen(savedRegion) ? savedRegion.id : REGIONS[0].id
          };
        } catch (error) {
          console.warn("Root save is corrupted, starting fresh.", error);
          return createInitialRootSave();
        }
      }

      function persistRootSave() {
        localStorage.setItem(ROOT_SAVE_KEY, JSON.stringify(rootSave));
      }

      function normalizePoseIds(value) {
        if (!Array.isArray(value)) return [];
        return [...new Set(value
          .map((poseId) => Number(poseId))
          .filter((poseId) => Number.isInteger(poseId) && poseId >= 0 && poseId < POSTCARD_POSE_LIMIT))]
          .sort((a, b) => a - b);
      }

      function normalizeReviewWordIds(region, value) {
        if (!Array.isArray(value)) return [];
        const playableIds = new Set(cumulativeWordsForLevel(region.level).map((word) => word.id));
        return [...new Set(value
          .filter((id) => typeof id === "string" && playableIds.has(id)))]
          .slice(0, REVIEW_WORD_LIMIT);
      }

      function normalizeWordIdList(value, allowedIds, limit = Infinity) {
        if (!Array.isArray(value)) return [];
        return [...new Set(value
          .filter((id) => typeof id === "string" && allowedIds.has(id)))]
          .slice(0, limit);
      }

      function regionWordsPerStation(region) {
        return (LEVEL_SETTINGS[region.level] || LEVEL_SETTINGS.N5).wordsPerStation;
      }

      function normalizeStationWordCounts(region, value) {
        const output = {};
        const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const maxCount = regionWordsPerStation(region);

        for (const station of region.stations) {
          const count = Number(source[station.id]);
          if (!Number.isFinite(count)) continue;
          output[station.id] = Math.max(0, Math.min(maxCount, Math.trunc(count)));
        }

        return output;
      }

      function normalizeStationFoundWordIds(region, value) {
        const output = {};
        const source = value && typeof value === "object" && !Array.isArray(value) ? value : {};
        const levelWordIds = new Set((WORDS_BY_LEVEL[region.level] || []).map((word) => word.id));

        for (const station of region.stations) {
          const ids = normalizeWordIdList(source[station.id], levelWordIds);
          if (ids.length) output[station.id] = ids;
        }

        return output;
      }

      function normalizeRegionSave(region, parsed = {}) {
        if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) parsed = {};
        const stationIds = new Set(region.stations.map((station) => station.id));
        const completedStationIds = Array.isArray(parsed.completedStationIds)
          ? [...new Set(parsed.completedStationIds.filter((id) => stationIds.has(id)))]
          : [];
        const collectedPostcardIds = Array.isArray(parsed.collectedPostcardIds)
          ? [...new Set(parsed.collectedPostcardIds.filter((id) => stationIds.has(id)))]
          : [];
        const stationPoseIds = {};
        const selectedPoseIds = {};
        const parsedPoseIds = parsed.stationPoseIds && typeof parsed.stationPoseIds === "object" ? parsed.stationPoseIds : {};
        const parsedSelectedPoseIds = parsed.selectedPoseIds && typeof parsed.selectedPoseIds === "object" ? parsed.selectedPoseIds : {};

        for (const station of region.stations) {
          const collectedByLegacy = collectedPostcardIds.includes(station.id);
          const poses = normalizePoseIds(parsedPoseIds[station.id]);
          if (!poses.length && collectedByLegacy) poses.push(0);
          if (poses.length) {
            stationPoseIds[station.id] = poses;
            const selected = Number(parsedSelectedPoseIds[station.id]);
            selectedPoseIds[station.id] = poses.includes(selected) ? selected : poses[0];
            if (!collectedPostcardIds.includes(station.id)) collectedPostcardIds.push(station.id);
          }
        }

        return {
          currentStationId: stationIds.has(parsed.currentStationId) ? parsed.currentStationId : region.stations[0].id,
          completedStationIds,
          collectedPostcardIds,
          foundWordIds: normalizeWordIdList(parsed.foundWordIds, new Set(cumulativeWordsForLevel(region.level).map((word) => word.id))),
          reviewWordIds: normalizeReviewWordIds(region, parsed.reviewWordIds),
          stationWordCounts: normalizeStationWordCounts(region, parsed.stationWordCounts),
          stationFoundWordIds: normalizeStationFoundWordIds(region, parsed.stationFoundWordIds),
          stationPoseIds,
          selectedPoseIds
        };
      }

      function createInitialRegionSave(region) {
        return {
          currentStationId: region.stations[0].id,
          completedStationIds: [],
          collectedPostcardIds: [],
          foundWordIds: [],
          reviewWordIds: [],
          stationWordCounts: {},
          stationFoundWordIds: {},
          stationPoseIds: {},
          selectedPoseIds: {}
        };
      }

      function migrateLegacyN5Save() {
        try {
          const raw = localStorage.getItem(LEGACY_SAVE_KEY);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!REGIONS[0].stations.some((station) => station.id === parsed.currentStationId)) return null;
          persistRootSave();
          return normalizeRegionSave(REGIONS[0], parsed);
        } catch (error) {
          console.warn("Legacy save migration failed.", error);
          return null;
        }
      }

      function loadRegionSave(regionId) {
        const region = REGION_BY_ID.get(regionId) || REGIONS[0];
        try {
          const raw = localStorage.getItem(regionSaveKey(region.id));
          if (!raw && region.id === REGIONS[0].id) {
            const migrated = migrateLegacyN5Save();
            if (migrated) return migrated;
          }
          if (!raw) return createInitialRegionSave(region);
          const parsed = JSON.parse(raw);
          return normalizeRegionSave(region, parsed);
        } catch (error) {
          console.warn("Region save is corrupted, starting fresh.", error);
          return createInitialRegionSave(region);
        }
      }

      function persistSave() {
        save = normalizeRegionSave(currentRegion(), save);
        localStorage.setItem(regionSaveKey(currentRegion().id), JSON.stringify(save));
      }

      function currentStation() {
        return currentStations().find((station) => station.id === save.currentStationId) || currentStations()[0];
      }

      function currentStationIndex() {
        return currentStations().findIndex((station) => station.id === currentStation().id);
      }

      function clampStationCount(stationId) {
        const count = Number(save.stationWordCounts && save.stationWordCounts[stationId]);
        if (!Number.isFinite(count)) return 0;
        return Math.max(0, Math.min(currentWordsPerStation(), Math.trunc(count)));
      }

      function shuffled(items) {
        const copy = [...items];
        for (let index = copy.length - 1; index > 0; index -= 1) {
          const swapIndex = Math.floor(Math.random() * (index + 1));
          [copy[index], copy[swapIndex]] = [copy[swapIndex], copy[index]];
        }
        return copy;
      }

      function kanaUnits(text) {
        return Array.from(text);
      }

      function levelRank(level) {
        return LEVEL_ORDER.indexOf(level);
      }

      function cumulativeWordsForLevel(level) {
        const rank = levelRank(level);
        return ALL_WORDS.filter((word) => levelRank(word.level) <= rank);
      }

      function currentPlayableWords() {
        return cumulativeWordsForLevel(currentLevel());
      }

      function currentLevelWords() {
        return WORDS_BY_LEVEL[currentLevel()] || [];
      }

      function currentReviewWords(maxLength = currentBoardSize() * currentBoardSize()) {
        const playableWords = new Map(currentPlayableWords()
          .filter((word) => kanaUnits(word.normalizedReading).length <= maxLength)
          .map((word) => [word.id, word]));
        return (save.reviewWordIds || [])
          .map((id) => playableWords.get(id))
          .filter(Boolean);
      }

      function addReviewWord(word) {
        if (levelRank(word.level) > levelRank(currentLevel())) return;
        const nextIds = [word.id, ...(save.reviewWordIds || []).filter((id) => id !== word.id)];
        save.reviewWordIds = nextIds.slice(0, REVIEW_WORD_LIMIT);
      }

      function rotateReviewWord(wordId) {
        if (!save.reviewWordIds || !save.reviewWordIds.includes(wordId)) return;
        save.reviewWordIds = [
          ...save.reviewWordIds.filter((id) => id !== wordId),
          wordId
        ];
      }

      function buildKanaBag(words) {
        const counts = new Map();
        for (const word of words) {
          for (const kana of kanaUnits(word.normalizedReading)) {
            counts.set(kana, (counts.get(kana) || 0) + 1);
          }
        }
        const bag = [];
        for (const [kana, count] of counts.entries()) {
          const isSmall = KANA_SMALL.has(kana);
          const isVoiced = KANA_VOICED.test(kana);
          const adjusted = Math.max(1, Math.min(isSmall ? 2 : isVoiced ? 4 : 9, count));
          for (let i = 0; i < adjusted; i += 1) bag.push(kana);
        }
        return bag;
      }

      function randomKana(currentGrid) {
        const kanaBag = buildKanaBag(currentPlayableWords());
        const smallCount = currentGrid.filter((cell) => KANA_SMALL.has(cell)).length;
        const voicedCount = currentGrid.filter((cell) => KANA_VOICED.test(cell || "")).length;
        const smallLimit = currentBoardSize() >= 6 ? 6 : currentBoardSize() >= 5 ? 4 : 3;
        const voicedLimit = currentBoardSize() >= 6 ? 10 : currentBoardSize() >= 5 ? 8 : 6;
        for (let attempt = 0; attempt < 30; attempt += 1) {
          const kana = kanaBag[Math.floor(Math.random() * kanaBag.length)];
          if (kana === "ー") continue;
          if (KANA_SMALL.has(kana) && smallCount >= smallLimit) continue;
          if (KANA_VOICED.test(kana) && voicedCount >= voicedLimit) continue;
          return kana;
        }
        return "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろわん"[Math.floor(Math.random() * 46)];
      }

      function chooseTargets() {
        const foundGlobal = new Set(save.foundWordIds);
        const maxLength = currentBoardSize() * currentBoardSize();
        const currentWords = currentLevelWords().filter((word) => kanaUnits(word.normalizedReading).length <= maxLength);
        const reviewWords = currentReviewWords(maxLength);
        const unseen = shuffled(currentWords.filter((word) => !foundGlobal.has(word.id)));
        const seen = shuffled(currentWords.filter((word) => foundGlobal.has(word.id)));
        const desiredCount = 3 + Math.floor(Math.random() * 3);
        const targets = [];

        if (currentLevel() === "N5" && save.currentStationId === currentStations()[0].id && foundGlobal.size === 0) {
          for (const id of ["n5_0011", "n5_0012", "n5_0001"]) {
            const word = ALL_WORDS.find((item) => item.id === id);
            if (word) targets.push(word);
          }
        }

        for (const word of reviewWords.slice(0, REVIEW_TARGETS_PER_ROUND)) {
          if (!targets.some((target) => target.id === word.id)) targets.push(word);
        }

        for (const word of [...unseen, ...seen]) {
          if (targets.length >= desiredCount) break;
          if (!targets.some((target) => target.id === word.id)) targets.push(word);
        }

        return targets.slice(0, MAX_ROUND_TARGETS);
      }

      function uniqueWords(words) {
        const seen = new Set();
        return words.filter((word) => {
          if (!word || seen.has(word.id)) return false;
          seen.add(word.id);
          return true;
        });
      }

      function roundTargetCandidatePool(priorityWords, maxLength) {
        const foundGlobal = new Set(save.foundWordIds);
        const currentWords = currentLevelWords().filter((word) => kanaUnits(word.normalizedReading).length <= maxLength);
        const unseen = shuffled(currentWords.filter((word) => !foundGlobal.has(word.id)));
        const seen = shuffled(currentWords.filter((word) => foundGlobal.has(word.id)));
        return uniqueWords([...priorityWords, ...unseen, ...seen]);
      }

      function tryPlaceWord(grid, word) {
        const size = currentBoardSize();
        const units = kanaUnits(word.normalizedReading);
        const nextGrid = [...grid];
        const path = [];
        const used = new Set();
        const indexes = [...Array(size * size).keys()];

        for (const kana of units) {
          const matching = indexes.filter((index) => !used.has(index) && nextGrid[index] === kana);
          const empty = indexes.filter((index) => !used.has(index) && !nextGrid[index]);
          const candidates = matching.length ? matching : empty;
          if (!candidates.length) return null;

          const index = shuffled(candidates)[0];
          nextGrid[index] = kana;
          path.push(index);
          used.add(index);
        }

        return { grid: nextGrid, path };
      }

      function placeOptionalTargets(grid, placedTargets, candidates, desiredCount) {
        let nextGrid = [...grid];
        const placedIds = new Set(placedTargets.map((target) => target.word.id));
        const nextTargets = [...placedTargets];

        for (const word of shuffled(candidates)) {
          if (nextTargets.length >= desiredCount) break;
          if (placedIds.has(word.id)) continue;
          const result = tryPlaceWord(nextGrid, word);
          if (!result) continue;
          nextGrid = result.grid;
          placedIds.add(word.id);
          nextTargets.push({ word, path: result.path, found: false });
        }

        return { grid: nextGrid, placedTargets: nextTargets };
      }

      function placeTargetsRandomly(size, priorityCandidates, candidates, desiredCount) {
        let best = { grid: Array(size * size).fill(""), placedTargets: [] };
        const priorityIds = new Set(priorityCandidates.map((word) => word.id));
        const fallbackCandidates = candidates.filter((word) => !priorityIds.has(word.id));

        for (let attempt = 0; attempt < 60; attempt += 1) {
          let grid = Array(size * size).fill("");
          const placedTargets = [];
          const orderedCandidates = uniqueWords([...shuffled(priorityCandidates), ...shuffled(fallbackCandidates)]);

          for (const word of orderedCandidates) {
            if (placedTargets.length >= desiredCount) break;
            const result = tryPlaceWord(grid, word);
            if (!result) continue;
            grid = result.grid;
            placedTargets.push({ word, path: result.path, found: false });
          }

          if (placedTargets.length > best.placedTargets.length) {
            best = { grid, placedTargets };
          }
          if (placedTargets.length >= desiredCount) break;
        }

        return best;
      }

      function forceMinimumTargets(size, candidates, minCount, desiredCount) {
        let grid = Array(size * size).fill("");
        const placedTargets = [];

        for (const word of candidates) {
          if (placedTargets.length >= minCount) break;
          const result = tryPlaceWord(grid, word);
          if (!result) continue;
          grid = result.grid;
          placedTargets.push({ word, path: result.path, found: false });
        }

        if (placedTargets.length < minCount) return null;
        return placeOptionalTargets(grid, placedTargets, candidates, desiredCount);
      }

      function generateRound() {
        window.clearTimeout(roundAdvanceTimer);
        roundAdvanceTimer = 0;
        const size = currentBoardSize();
        const targetCandidates = chooseTargets();
        const maxLength = size * size;
        const candidates = roundTargetCandidatePool(targetCandidates, maxLength);
        const minCount = Math.min(MIN_ROUND_TARGETS, candidates.length);
        const desiredCount = Math.min(MAX_ROUND_TARGETS, Math.max(minCount, targetCandidates.length));
        let best = placeTargetsRandomly(size, targetCandidates, candidates, desiredCount);

        if (best.placedTargets.length < minCount) {
          best = forceMinimumTargets(size, candidates, minCount, desiredCount) || best;
        }

        const grid = [...best.grid];
        for (let index = 0; index < grid.length; index += 1) {
          if (!grid[index]) grid[index] = randomKana(grid);
        }
        board = grid;
        roundTargets = best.placedTargets.slice(0, MAX_ROUND_TARGETS);
        roundFoundIds = new Set();
        hintedTargetIds = new Set();
        selectedCells = [];
        hintsLeft = HINTS_PER_ROUND;
        els.board.style.setProperty("--board-size", String(size));
        els.board.setAttribute("aria-label", `${size} 乘 ${size} 平假名棋盤`);
        renderBoard();
        updateSpell();
        updateTargetCount();
        updateClue();
        renderControls();
        setMessage(`新棋盤準備好了，本盤有 ${roundTargets.length} 個保底詞。`);
      }

        for (const station of currentStations()) {

      function switchStation(stationId) {

        renderAll();

        setMessage(poseCount

          button.style.setProperty("--mobile-map-y", region.mobileMapY);

          level.className = "region-level";
          level.textContent = region.shortLabel;
