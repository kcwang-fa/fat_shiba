      }

      function resetCurrentRound() {
        roundFoundIds = new Set();
        hintedTargetIds = new Set();
        selectedCells = [];
        hintsLeft = HINTS_PER_ROUND;
      }

      function stationVisualIndex(station) {
        const index = currentStations().findIndex((item) => item.id === station.id);
        return Math.max(0, index);
      }

      function collectedPoseIds(station) {
        const poses = normalizePoseIds(save.stationPoseIds && save.stationPoseIds[station.id]);
        if (!poses.length && save.collectedPostcardIds.includes(station.id)) return [0];
        return poses;
      }

      function selectedPoseId(station) {
        const poses = collectedPoseIds(station);
        if (!poses.length) return 0;
        const selected = Number(save.selectedPoseIds && save.selectedPoseIds[station.id]);
        return poses.includes(selected) ? selected : poses[0];
      }

      function poseImageIndex(station, poseId) {
        return (stationVisualIndex(station) + poseId) % POSTCARD_SHIBA_IMAGES.length;
      }

      function poseImageSrc(station, poseId) {
        return POSTCARD_SHIBA_IMAGES[poseImageIndex(station, poseId)];
      }

      function selectPostcardPose(station, poseId) {
        const poses = collectedPoseIds(station);
        if (!poses.includes(poseId)) return false;
        if (!save.selectedPoseIds) save.selectedPoseIds = {};
        save.selectedPoseIds[station.id] = poseId;
        persistSave();
        return true;
      }

      function collectNextPose(station) {
        if (!save.stationPoseIds) save.stationPoseIds = {};
        if (!save.selectedPoseIds) save.selectedPoseIds = {};
        const poses = collectedPoseIds(station);
        let poseId = 0;
        while (poses.includes(poseId) && poseId < POSTCARD_POSE_LIMIT) poseId += 1;
        const isNewPose = poseId < POSTCARD_POSE_LIMIT;
        const nextPoseId = isNewPose ? poseId : selectedPoseId(station);

        if (isNewPose) {
          save.stationPoseIds[station.id] = [...poses, nextPoseId].sort((a, b) => a - b);
        } else {
          save.stationPoseIds[station.id] = poses;
        }
        save.selectedPoseIds[station.id] = nextPoseId;
        if (!save.collectedPostcardIds.includes(station.id)) save.collectedPostcardIds.push(station.id);
        save.stationWordCounts[station.id] = 0;
        return {
          poseId: nextPoseId,
          isNewPose,
          collectedCount: collectedPoseIds(station).length
        };
      }

      function postcardSeed(text) {
        let hash = 2166136261;
        for (let index = 0; index < text.length; index += 1) {
          hash ^= text.charCodeAt(index);
          hash = Math.imul(hash, 16777619);
        }
        return hash >>> 0;
      }

      function seededUnit(seed, salt) {
        let value = seed + Math.imul(salt + 1, 2654435761);
        value ^= value >>> 16;
        value = Math.imul(value, 2246822507);
        value ^= value >>> 13;
        value = Math.imul(value, 3266489909);
        value ^= value >>> 16;
        return (value >>> 0) / 4294967295;
      }

      function readPercent(value) {
        return Number.parseFloat(String(value).replace("%", ""));
      }

      function percent(value) {
        return `${Number(value.toFixed(2))}%`;
      }

      function fixedPostcardCornerLayout(station, poseId, baseLayout) {
        const seed = postcardSeed(`${currentRegion().id}:${station.id}:${poseId}`);
        const widthFactor = 0.9 + seededUnit(seed, 0) * 0.22;

        return {
          width: percent(readPercent(baseLayout.width) * widthFactor),
          right: "4%",
          bottom: "12%",
          modalWidth: percent(readPercent(baseLayout.modalWidth) * widthFactor),
          modalRight: "6%",
          modalBottom: "10%"
        };
      }

      function postcardVisual(station, poseId = selectedPoseId(station)) {
        const index = poseImageIndex(station, poseId);
        const baseLayout = POSTCARD_SHIBA_LAYOUTS[index % POSTCARD_SHIBA_LAYOUTS.length];
        return {
          scene: station.postcard,
          shiba: POSTCARD_SHIBA_IMAGES[index % POSTCARD_SHIBA_IMAGES.length],
          layout: fixedPostcardCornerLayout(station, poseId, baseLayout),
          poseId
        };
      }

      function applyPostcardLayout(card, layout) {
        card.style.setProperty("--shiba-width", layout.width);
        card.style.setProperty("--shiba-right", layout.right);
        card.style.setProperty("--shiba-bottom", layout.bottom);
        card.style.setProperty("--shiba-modal-width", layout.modalWidth);
        card.style.setProperty("--shiba-modal-right", layout.modalRight);
        card.style.setProperty("--shiba-modal-bottom", layout.modalBottom);
      }

      function optimizedImageSrc(src) {
        return WEBP_CANDIDATE_RE.test(src) ? src.replace(/\.png$/i, ".webp") : src;
      }

      function setImageSource(img, src) {
        const optimizedSrc = optimizedImageSrc(src);
        img.dataset.fallbackSrc = optimizedSrc === src ? "" : src;
        img.onerror = () => {
          const fallbackSrc = img.dataset.fallbackSrc;
          if (fallbackSrc) {
            img.dataset.fallbackSrc = "";
            img.src = fallbackSrc;
            return;
          }
          img.classList.add("hidden");
        };
        img.src = optimizedSrc;
      }

      function createPostcardImage(className, src, alt) {
        const img = document.createElement("img");
        img.className = className;
        img.alt = alt;
        img.loading = "lazy";
        img.decoding = "async";
        img.fetchPriority = "low";
        setImageSource(img, src);
        return img;
      }

      function updatePostcardImage(img, src, alt) {
        img.classList.remove("hidden");
        img.alt = alt;
        img.decoding = "async";
        img.fetchPriority = "high";
        setImageSource(img, src);
      }

      function createPoseOption(station, poseId, options = {}) {
        const button = document.createElement("button");
        const isCollected = options.collected !== false;
        const isActive = options.active === true;
        button.type = "button";
        button.className = `pose-option ${isActive ? "active" : ""} ${isCollected ? "" : "locked"}`.trim();
        button.disabled = !isCollected;
        button.setAttribute("aria-pressed", String(isActive));
        button.setAttribute("aria-label", isCollected
          ? `選擇${station.placeZh}姿勢 ${poseId + 1}`
          : `${station.placeZh}姿勢 ${poseId + 1} 尚未收集`);
        if (isCollected) {
          button.appendChild(createPostcardImage("", poseImageSrc(station, poseId), `呷胖姿勢 ${poseId + 1}`));
        } else {
          button.textContent = String(poseId + 1);
        }
        return button;
      }

      function renderModalPoseControls(station, poseId) {
        const poses = collectedPoseIds(station);
        const collectedCount = poses.length;
        els.modalPoseProgress.textContent = `姿勢收集進度 ${collectedCount} / ${POSTCARD_POSE_LIMIT}`;
        els.modalPoseSwitch.innerHTML = "";
        for (let index = 0; index < POSTCARD_POSE_LIMIT; index += 1) {
          const option = createPoseOption(station, index, {
            collected: poses.includes(index),
            active: poseId === index
          });
          option.addEventListener("click", () => {
            if (!selectPostcardPose(station, index)) return;
            renderModalPostcard(station, { badgeText: "已收藏", poseId: index });
            renderPostcards();
          });
          els.modalPoseSwitch.appendChild(option);
        }
      }

      function renderModalPostcard(station, options = {}) {
        const poseId = options.poseId ?? selectedPoseId(station);
        const visual = postcardVisual(station, poseId);
        const badgeText = options.badgeText || "新明信片";
        applyPostcardLayout(els.modalPostcard, visual.layout);
        els.modalPostcard.classList.add("clean");
        updatePostcardImage(els.modalPostcardImage, visual.scene, `${station.placeZh}明信片底圖`);
        els.modalPostcardShiba.classList.add("hidden");
        els.modalPostcardBadge.textContent = badgeText;
        els.modalPostcardTitle.textContent = station.placeZh;
        els.modalPostcardMeta.textContent = `${station.placeZh}｜姿勢 ${poseId + 1} / ${POSTCARD_POSE_LIMIT}`;
        els.modalPostcardNote.textContent = `呷胖吃到 ${station.foodZh}，把這一站收進行李。`;
        renderModalPoseControls(station, poseId);
        els.modalTravelLogText.textContent = station.travelLog || `呷胖在${station.placeZh}吃到${station.foodZh}，今天也有好好把旅程記下來。`;
      }

      function openCollectedPostcard(station) {
        els.modalTitle.textContent = `${station.placeZh}明信片`;
        els.modalText.textContent = `${currentRegion().name}區旅行收集本第 ${currentStations().indexOf(station) + 1} 張。`;
        els.modalNextButton.textContent = "關閉";
        els.modalNextButton.dataset.action = "close";
        renderModalPostcard(station, { badgeText: "已收藏", poseId: selectedPoseId(station) });
        els.stationModal.classList.add("open");
      }

      function renderPostcards() {
        const collected = new Set(save.collectedPostcardIds);
        const collectedCount = currentStations().filter((station) => collected.has(station.id)).length;
        const totalCount = currentStations().length;
        const progress = totalCount ? (collectedCount / totalCount) * 100 : 0;
        els.postcardAlbumStamp.textContent = `${collectedCount} / ${totalCount}`;
        els.postcardAlbumFill.style.width = `${progress}%`;
        els.postcardAlbumText.textContent = collectedCount === totalCount
          ? `${currentRegion().name}區已收齊`
          : `已收集 ${collectedCount} 張，還差 ${totalCount - collectedCount} 張`;
        els.postcardAlbumHint.textContent = collectedCount
          ? "點開已收藏的明信片，可以重新看呷胖的旅行紀錄。"
          : "完成每一站就能把水彩明信片收進來。";
        els.postcardGrid.innerHTML = "";
        for (const station of currentStations()) {
          const isCollected = collected.has(station.id);
          const stationNumber = currentStations().indexOf(station) + 1;
          const item = document.createElement("article");
          item.className = `postcard-entry ${isCollected ? "unlocked" : "locked"}`;
          const card = document.createElement("div");
          card.className = `postcard ${isCollected ? "" : "locked"}`.trim();

          if (isCollected) {
            const visual = postcardVisual(station, selectedPoseId(station));
            applyPostcardLayout(card, visual.layout);
            card.append(
              createPostcardImage("postcard-scene", visual.scene, `${station.placeZh}明信片底圖`),
              createPostcardImage("postcard-shiba", visual.shiba, "呷胖明信片貼圖")
            );
            item.tabIndex = 0;
            item.setAttribute("role", "button");
            item.setAttribute("aria-label", `查看${station.placeZh}明信片`);
            item.addEventListener("click", () => openCollectedPostcard(station));
            item.addEventListener("keydown", (event) => {
              if (event.target.closest("button")) return;
              if (event.key !== "Enter" && event.key !== " ") return;
              event.preventDefault();
              openCollectedPostcard(station);
            });
          } else {
            const slot = document.createElement("span");
            slot.className = "postcard-slot";
            slot.setAttribute("aria-hidden", "true");
            card.append(slot);
            item.setAttribute("aria-label", `第 ${stationNumber} 站明信片尚未取得`);
          }

          const caption = document.createElement("div");
          caption.className = "postcard-caption";
          const captionHead = document.createElement("div");
          captionHead.className = "postcard-caption-head";
          const title = document.createElement("strong");
          title.className = "postcard-title";
          title.textContent = isCollected ? station.placeZh : "尚未取得";
          captionHead.appendChild(title);
          if (isCollected && collectedPoseIds(station).length > 1) {
            const poseButton = document.createElement("button");
            poseButton.type = "button";
            poseButton.className = "pose-menu-button";
            poseButton.textContent = "姿勢";
            poseButton.setAttribute("aria-expanded", "false");
            poseButton.addEventListener("click", (event) => {
              event.stopPropagation();
              const picker = caption.querySelector(".pose-picker");
              const isOpen = picker && !picker.hidden;
              if (picker) picker.hidden = isOpen;
              poseButton.setAttribute("aria-expanded", String(!isOpen));
            });
            captionHead.appendChild(poseButton);
          }
          const food = document.createElement("span");
          food.className = "postcard-food";
          food.textContent = isCollected ? `${station.placeZh}｜姿勢 ${selectedPoseId(station) + 1} / ${POSTCARD_POSE_LIMIT}` : `第 ${stationNumber} 站`;
          const note = document.createElement("span");
          note.className = "postcard-note";
          note.textContent = isCollected ? station.foodZh : `拼滿 ${currentWordsPerStation()} 詞解鎖`;
          caption.append(captionHead, food, note);
          if (isCollected && collectedPoseIds(station).length > 1) {
            const picker = document.createElement("div");
            picker.className = "pose-picker";
            picker.hidden = true;
            for (const poseId of collectedPoseIds(station)) {
              const option = createPoseOption(station, poseId, {
                collected: true,
                active: selectedPoseId(station) === poseId
              });
              option.addEventListener("click", (event) => {
                event.stopPropagation();
                if (!selectPostcardPose(station, poseId)) return;
                renderPostcards();
              });
              picker.appendChild(option);
            }
            caption.appendChild(picker);
          }
          item.append(card, caption);
          els.postcardGrid.appendChild(item);
        }
      }

      function renderControls() {
        els.hintButton.textContent = `提示 ${hintsLeft}`;
        const station = currentStation();
        const canAdvance = save.completedStationIds.includes(station.id) && currentStationIndex() < currentStations().length - 1;
        els.nextStationButton.disabled = !canAdvance;
      }

      function updateSpell() {
        const spell = selectedCells.map((index) => board[index]).join("");
        els.currentSpell.textContent = spell || "請連假名";
        for (const cell of els.board.querySelectorAll(".kana-cell")) {
          const index = Number(cell.dataset.index);
          const isSelected = selectedCells.includes(index);
          cell.classList.toggle("selected", isSelected);
          cell.textContent = isSelected ? "" : board[index];
          cell.setAttribute("aria-label", isSelected ? `第 ${index + 1} 格已使用` : `第 ${index + 1} 格 ${board[index]}`);
          cell.tabIndex = isSelected ? -1 : 0;
        }
      }

      function updateTargetCount() {
        const left = roundTargetsLeft();
        els.targetCount.textContent = `本盤還藏 ${left} 個目標詞`;
      }

      function roundTargetsLeft() {
        return roundTargets.filter((target) => !roundFoundIds.has(target.word.id)).length;
      }

      function currentClueTarget() {
        return roundTargets.find((target) => !roundFoundIds.has(target.word.id)) || null;
      }

      function updateClue() {
        const target = currentClueTarget();
        els.cluePanel.classList.remove("hidden");
        els.clueText.textContent = target ? target.word.zh : "本盤保底詞都找完了";
      }

      function setMessage(text) {
        els.message.textContent = text;
      }

      function selectCell(index) {
        if (selectedCells.includes(index)) {
          if (selectedCells[selectedCells.length - 1] === index) {
            selectedCells.pop();
            updateSpell();
          }
          return;
        }
        selectedCells.push(index);
        updateSpell();
      }

      function wordDisplay(word) {
        if (word.reading === word.writing) return word.reading;
        return `${word.normalizedReading}／${word.writing}`;
      }

      function pickMatchedWord(spell) {
        const allowedLevels = new Set(LEVEL_ORDER.slice(0, levelRank(currentLevel()) + 1));
        const matches = (WORDS_BY_READING.get(spell) || []).filter((word) => allowedLevels.has(word.level));
        if (!matches.length) return null;
        const station = currentStation();
        const stationFound = new Set(save.stationFoundWordIds[station.id] || []);
        return (
          matches.find((word) => word.level === currentLevel() && !roundFoundIds.has(word.id) && !stationFound.has(word.id)) ||
          matches.find((word) => !roundFoundIds.has(word.id) && !stationFound.has(word.id)) ||
          matches.find((word) => !roundFoundIds.has(word.id)) ||
          matches[0]
        );
      }

      function showWordCard(word) {
        els.wordMain.textContent = wordDisplay(word);
        els.wordZh.textContent = word.zh;
        els.wordLevel.textContent = word.level;
        els.wordCard.classList.add("show");
      }

      function scheduleNextRoundIfNeeded(station) {
        if (clampStationCount(station.id) >= currentWordsPerStation()) return false;
        if (roundTargetsLeft() > 0) return false;

        window.clearTimeout(roundAdvanceTimer);
        setMessage("本盤保底詞找完了，幫你換下一盤。");
        roundAdvanceTimer = window.setTimeout(() => {
          generateRound();
        }, 900);
        return true;
      }

      function submitSpell() {
        const spell = selectedCells.map((index) => board[index]).join("");
        if (!spell) {
          setMessage("先選幾個假名再送出。");
          return;
        }

        const word = pickMatchedWord(spell);
        if (!word) {
          setMessage(`「${spell}」目前不在 ${currentLevel()} 的累加詞庫裡。`);
          return;
        }

        const station = currentStation();
        if (!save.stationFoundWordIds[station.id]) save.stationFoundWordIds[station.id] = [];
        const stationFound = new Set(save.stationFoundWordIds[station.id]);
        const isCurrentLevelWord = word.level === currentLevel();
        const isNewForStation = isCurrentLevelWord && !stationFound.has(word.id);

        roundFoundIds.add(word.id);
        if (!save.foundWordIds.includes(word.id)) save.foundWordIds.push(word.id);
        if (isNewForStation) {
          save.stationFoundWordIds[station.id].push(word.id);
          save.stationWordCounts[station.id] = clampStationCount(station.id) + 1;
        }
        rotateReviewWord(word.id);

        showWordCard(word);
        if (!isCurrentLevelWord) {
          setMessage(`命中：${wordDisplay(word)}。這是 ${word.level} 複習詞，會跳卡但不計入 ${currentLevel()} 過站。`);
        } else {
          setMessage(isNewForStation ? `命中：${wordDisplay(word)}。呷胖離下一口飯更近了。` : `命中：${wordDisplay(word)}。這站已經算過這個詞了。`);
        }
        selectedCells = [];
        updateSpell();
        updateTargetCount();
        updateClue();
        persistSave();
        renderAll();

        if (clampStationCount(station.id) >= currentWordsPerStation()) {
          completeStation(station);
          return;
        }

        scheduleNextRoundIfNeeded(station);
      }

      function completeStation(station) {
        window.clearTimeout(roundAdvanceTimer);
        roundAdvanceTimer = 0;
        if (!save.completedStationIds.includes(station.id)) save.completedStationIds.push(station.id);
        const poseResult = collectNextPose(station);
        persistSave();
        renderAll();
        generateRound();

        const isFinal = currentStationIndex() === currentStations().length - 1;
        els.modalTitle.textContent = poseResult.isNewPose
          ? (poseResult.poseId === 0 && isFinal ? `${currentRegion().name}區完成` : poseResult.poseId === 0 ? "過站成功" : "新姿勢入手")
          : "姿勢已收齊";
        els.modalText.textContent = poseResult.isNewPose
          ? `呷胖在${station.placeZh}吃到${station.foodZh}，姿勢 ${poseResult.poseId + 1} / ${POSTCARD_POSE_LIMIT} 入手。`
          : `${station.placeZh}的 ${POSTCARD_POSE_LIMIT} 個姿勢都收齊了，這張明信片很有班表感。`;
        els.modalNextButton.textContent = isFinal ? `留在${currentRegion().name}回味` : "前往下一站";
        els.modalNextButton.dataset.action = "next";
        renderModalPostcard(station, {
          badgeText: poseResult.isNewPose ? (poseResult.poseId === 0 ? "新明信片" : "新姿勢") : "已收齊",
          poseId: poseResult.poseId
        });
        els.stationModal.classList.add("open");
      }

      function goNextStation() {
        const index = currentStationIndex();
        if (!save.completedStationIds.includes(currentStation().id)) {
          setMessage(`這站要先拼滿 ${currentWordsPerStation()} 個 ${currentLevel()} 單字才能前進。`);
          els.stationModal.classList.remove("open");
          return;
        }
        if (index < currentStations().length - 1) {
          save.currentStationId = currentStations()[index + 1].id;
          persistSave();
          renderAll();
          generateRound();
          setMessage(`抵達${currentStation().placeZh}，繼續拼 ${currentWordsPerStation()} 個 ${currentLevel()} 單字。`);
        }
        els.stationModal.classList.remove("open");
      }

      function clearSelection() {
        selectedCells = [];
        updateSpell();
        setMessage("已清除目前拼字。");
      }

      function useHint() {
        if (hintsLeft <= 0) {
          setMessage("這盤提示用完了，換一盤會補滿。");
          return;
        }
        const hiddenTargets = roundTargets.filter((target) => !roundFoundIds.has(target.word.id));
        if (!hiddenTargets.length) {
          setMessage("本盤保底詞都找完了，可以換一盤。");
          return;
        }
        hintsLeft -= 1;
        const freshTargets = hiddenTargets.filter((target) => !hintedTargetIds.has(target.word.id));
        const hintPool = freshTargets.length ? freshTargets : hiddenTargets;
        const target = currentClueTarget() || hintPool[Math.floor(Math.random() * hintPool.length)];
        hintedTargetIds.add(target.word.id);
        addReviewWord(target.word);
        const firstIndex = target.path[0];
        const cell = els.board.querySelector(`[data-index="${firstIndex}"]`);
        if (cell) {
          cell.classList.add("hint");
          window.setTimeout(() => cell.classList.remove("hint"), 2000);
        }
        renderControls();
        persistSave();
        setMessage("提示亮起一個保底詞的首字，這個詞之後會再出現讓你複習。");
      }

      function armReset() {
        if (!resetArmed) {
          resetArmed = true;
          els.resetButton.textContent = "再按一次確認";
          setMessage("再按一次會清掉進度。這種按鈕我們要謹慎，資料不會自己長回來。");
          window.clearTimeout(resetTimer);
          resetTimer = window.setTimeout(() => {
            resetArmed = false;
            els.resetButton.textContent = "重置進度";
          }, 4000);
          return;
        }
        window.clearTimeout(resetTimer);
        resetArmed = false;
        save = createInitialRegionSave(currentRegion());
        persistSave();
        els.resetButton.textContent = "重置進度";
        closePostcardAlbum();
        renderAll();
        generateRound();
        setMessage(`${currentRegion().name}區進度已重置，其他區不受影響。`);
      }

      function cellFromPointer(event) {
        const element = document.elementFromPoint(event.clientX, event.clientY);
        const cell = element && element.closest ? element.closest(".kana-cell") : null;
        if (!cell || !els.board.contains(cell)) return null;
        return Number(cell.dataset.index);
      }

      els.board.addEventListener("pointerdown", (event) => {
        const index = cellFromPointer(event);
        if (index === null) return;
        isPointerSelecting = true;
        selectCell(index);
      });

      els.board.addEventListener("pointermove", (event) => {
        if (!isPointerSelecting) return;
        const index = cellFromPointer(event);
        if (index === null) return;
        selectCell(index);
      });

      window.addEventListener("pointerup", () => {
        isPointerSelecting = false;
      });

      els.submitButton.addEventListener("click", submitSpell);
      els.clearButton.addEventListener("click", clearSelection);
      els.hintButton.addEventListener("click", useHint);
      els.newRoundButton.addEventListener("click", generateRound);
      els.backToMapButton.addEventListener("click", showMapSelect);
      els.resetButton.addEventListener("click", armReset);
      els.nextStationButton.addEventListener("click", goNextStation);
      els.postcardToggleButton.addEventListener("click", openPostcardAlbum);
      els.postcardAlbumCloseButton.addEventListener("click", closePostcardAlbum);
      els.postcardAlbumBackdrop.addEventListener("click", (event) => {
        if (event.target === els.postcardAlbumBackdrop) closePostcardAlbum();
      });
      els.modalNextButton.addEventListener("click", () => {
        if (els.modalNextButton.dataset.action === "close") {
          els.stationModal.classList.remove("open");
          return;
        }
        goNextStation();
      });
      els.modalCloseButton.addEventListener("click", () => {
        els.stationModal.classList.remove("open");
      });
      window.addEventListener("keydown", (event) => {
        if (event.key !== "Escape") return;
        if (els.stationModal.classList.contains("open")) {
          els.stationModal.classList.remove("open");
          return;
        }
        if (els.postcardAlbumBackdrop.classList.contains("open")) closePostcardAlbum();
      });
      els.startJourneyButton.addEventListener("click", startJourney);

      renderAll();
      generateRound();

      window.__fatShibaTest = {
        getBoard: () => [...board],
        getTargets: () => roundTargets.map((target) => ({
          id: target.word.id,
          reading: target.word.normalizedReading,
          zh: target.word.zh,
          path: [...target.path]
        })),
        getSave: () => JSON.parse(JSON.stringify(save)),
        hasWord: (reading) => WORDS_BY_READING.has(reading),
        getRootSave: () => JSON.parse(JSON.stringify(rootSave)),
        getRegion: () => ({ id: currentRegion().id, level: currentLevel(), boardSize: currentBoardSize(), wordsPerStation: currentWordsPerStation() }),
        switchRegion,
        currentPlayableWordLevels: () => [...new Set(currentPlayableWords().map((word) => word.level))],
        currentTargetLevels: () => [...new Set(roundTargets.map((target) => target.word.level))],
        wordCountByLevel: () => LEVEL_ORDER.reduce((counts, level) => {
          counts[level] = WORDS_BY_LEVEL[level].length;
          return counts;
        }, {}),
        noLongDashWords: () => ALL_WORDS.every((word) => !word.normalizedReading.includes("ー")),
        targetCount: () => roundTargets.length,
        stationCount: () => clampStationCount(currentStation().id),
        clueText: () => els.clueText.textContent,
        clueHidden: () => els.cluePanel.classList.contains("hidden"),
        hintsLeft: () => hintsLeft,
        reviewWordIds: () => [...(save.reviewWordIds || [])],
        postcardVisuals: () => currentStations().map((station) => postcardVisual(station))
      };
    })();
  </script>
</body>
</html>
